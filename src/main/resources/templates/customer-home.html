<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Customer Home - Ecommerce Store</title>
		<link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='currentColor' class='bi bi-shop' viewBox='0 0 16 16'><path d='M2.97 1.35A1 1 0 0 1 3.73 1h8.54a1 1 0 0 1 .76.35l2.609 3.044A1.5 1.5 0 0 1 16 5.37v.255a2.375 2.375 0 0 1-4.25 1.458A2.371 2.371 0 0 1 9.875 8 2.37 2.37 0 0 1 8 7.083 2.37 2.37 0 0 1 6.125 8a2.37 2.37 0 0 1-1.875-.917A2.375 2.375 0 0 1 0 5.625V5.37a1.5 1.5 0 0 1 .361-.976l2.61-3.045zm1.78 4.275a1.375 1.375 0 0 0 2.75 0 .5.5 0 0 1 1 0 1.375 1.375 0 0 0 2.75 0 .5.5 0 0 1 1 0 1.375 1.375 0 1 0 2.75 0V5.37a.5.5 0 0 0-.12-.325L12.27 2H3.73L1.12 5.045A.5.5 0 0 0 1 5.37v.255a1.375 1.375 0 0 0 2.75 0 .5.5 0 0 1 1 0zM1.5 8.5A.5.5 0 0 1 2 9v6h1v-5a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v5h6V9a.5.5 0 0 1 1 0v6h.5a.5.5 0 0 1 0 1H.5a.5.5 0 0 1 0-1H1V9a.5.5 0 0 1 .5-.5zM4 15h3v-5H4v5zm5-5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1v-3zm3 0h-2v3h2v-3z'/></svg>" type="image/svg+xml">    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap"
			rel="stylesheet"
		/>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
		/>
		
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/next-ui.css" />
</head>
	<body class="next-ui">
  <div class="top-glow"></div>
		<header>
			<nav class="navbar navbar-expand-lg">
				<div class="container">
					<a class="navbar-brand" href="/customer/home"
						><i class="bi bi-shop me-2"></i>Customer Dashboard</a
					>
					<button
						class="navbar-toggler"
						type="button"
						data-bs-toggle="collapse"
						data-bs-target="#navbarNav"
						aria-controls="navbarNav"
						aria-expanded="false"
						aria-label="Toggle navigation"
					>
						<span class="navbar-toggler-icon"></span>
					</button>
					<div class="collapse navbar-collapse" id="navbarNav">
						<ul class="navbar-nav ms-auto">
							<li class="nav-item">
								<a class="nav-link" href="/customer/products"
									><i class="bi bi-grid me-1"></i>View Products</a
								>
							</li>
							<li class="nav-item">
								<a class="nav-link" href="/customer/cart"
									><i class="bi bi-cart me-1"></i>View Cart</a
								>
							</li>
							<li class="nav-item">
								<a class="nav-link" href="/customer/orders"
									><i class="bi bi-clock-history me-1"></i>Previous Orders</a
								>
							</li>
							<li class="nav-item">
								<a class="nav-link" href="/logout"
									><i class="bi bi-box-arrow-right me-1"></i>Logout</a
								>
							</li>
						</ul>
					</div>
				</div>
			</nav>
		</header>

		<main class="page-main">
  <div class="page-container container">
			<div
				class="container mt-4"
				th:if="${session.failure!=null || session.success!=null}"
			>
				<div
					class="alert alert-danger alert-dismissible fade show"
					th:if="${session.failure}"
					role="alert"
				>
					<span th:text="${session.failure}"></span>
					<button
						type="button"
						class="btn-close"
						data-bs-dismiss="alert"
						aria-label="Close"
					></button>
				</div>
				<div
					class="alert alert-success alert-dismissible fade show"
					th:if="${session.success}"
					role="alert"
				>
					<span th:text="${session.success}"></span>
					<button
						type="button"
						class="btn-close"
						data-bs-dismiss="alert"
						aria-label="Close"
					></button>
				</div>
				<div class="session-message-remover" th:text="${@sessionMessageRemover.removeMessage()}"></div>
			</div>

			<section class="hero page-hero text-center">
				<div class="container">
					<h1 class="display-4">Customer Dashboard</h1>
					<p class="lead">Browse products and manage your orders</p>
					<div class="mt-4">
						<a href="/customer/products" class="btn btn-primary btn-lg me-3"
							><i class="bi bi-grid me-2"></i>View Products</a
						>
						<a href="/customer/cart" class="btn btn-primary btn-lg me-3"
							><i class="bi bi-cart me-2"></i>View Cart</a
						>
						<a href="/customer/orders" class="btn btn-primary btn-lg me-3"
							><i class="bi bi-clock-history me-2"></i>Previous Orders</a
						>
						<a href="/logout" class="btn btn-primary btn-lg"
							><i class="bi bi-box-arrow-right me-2"></i>Logout</a
						>
					</div>
				</div>
			</section>
		  </div>
</main>

		<footer class="footer">
			<div class="container">
				<p class="mb-0">
					<i class="bi bi-c-circle me-1"></i>2026 Ecommerce Store. All rights
					reserved.
				</p>
			</div>
		</footer>

		<script>
			document.addEventListener("DOMContentLoaded", function () {
				setTimeout(function () {
					var alerts = document.querySelectorAll(".alert");
					alerts.forEach(function (alert) {
						var bsAlert = new bootstrap.Alert(alert);
						bsAlert.close();
					});
				}, 2000);
			});
		</script>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="/js/next-ui.js"></script>
</body>
</html>
