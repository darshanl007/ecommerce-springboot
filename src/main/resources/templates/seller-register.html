<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seller Registration - Ecommerce Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/next-ui.css" />
</head>
<body class="next-ui">
  <div class="top-glow"></div>
  <header>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-shop me-2"></i>Ecommerce Store</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/login"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a></li>
            <li class="nav-item"><a class="nav-link active" href="/seller/register"><i class="bi bi-person-workspace me-1"></i>Seller Register</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="page-main">
    <div class="page-container container">
      <div class="container mt-4" th:if="${session.failure!=null || session.success!=null}">
        <div class="alert alert-danger alert-dismissible fade show" th:if="${session.failure}" role="alert">
          <span th:text="${session.failure}"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div class="alert alert-success alert-dismissible fade show" th:if="${session.success}" role="alert">
          <span th:text="${session.success}"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div class="session-message-remover" th:text="${@sessionMessageRemover.removeMessage()}"></div>
      </div>

      <section class="section-shell p-4 p-lg-5">
        <div class="row g-4">
          <div class="col-lg-5">
            <div class="hero page-hero h-100 d-flex flex-column justify-content-center">
              <h1 class="display-6 mb-3">Start Selling Today</h1>
              <p class="lead mb-4">Create your seller account and manage products, stock, and sales from one dashboard.</p>
              <div class="quick-actions">
                <div class="quick-card"><i class="bi bi-plus-circle me-2"></i>Add Products</div>
                <div class="quick-card"><i class="bi bi-graph-up-arrow me-2"></i>Track Growth</div>
                <div class="quick-card"><i class="bi bi-shield-check me-2"></i>Verified Platform</div>
              </div>
            </div>
          </div>
          <div class="col-lg-7">
            <div class="form-container p-4 p-lg-5">
              <h2 class="mb-4">Seller Details</h2>
              <form action="/seller/register" method="post" th:object="${seller}">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" name="name" th:value="*{name}" />
                    <span class="text-danger" th:errors="*{name}"></span>
                  </div>
                  <div class="col-md-6">
                    <label for="mobile" class="form-label">Mobile</label>
                    <input type="tel" class="form-control" id="mobile" name="mobile" th:value="*{mobile}" />
                    <span class="text-danger" th:errors="*{mobile}"></span>
                  </div>
                  <div class="col-12">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" th:value="*{email}" />
                    <span class="text-danger" th:errors="*{email}"></span>
                  </div>
                  <div class="col-md-6">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" th:value="*{password}" />
                    <span class="text-danger" th:errors="*{password}"></span>
                  </div>
                  <div class="col-md-6">
                    <label for="confirmpassword" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmpassword" name="confirmpassword" th:value="*{confirmpassword}" />
                    <span class="text-danger" th:errors="*{confirmpassword}"></span>
                  </div>
                  <div class="col-12">
                    <label for="address" class="form-label">Address</label>
                    <textarea class="form-control" id="address" name="address" rows="4" th:text="*{address}"></textarea>
                    <span class="text-danger" th:errors="*{address}"></span>
                  </div>
                </div>
                <button type="submit" class="btn btn-primary mt-4 w-100">Register as Seller</button>
              </form>
              <p class="mt-4 mb-0 text-center">Want to register as Customer? <a href="/customer/register">Click here</a></p>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p class="mb-0"><i class="bi bi-c-circle me-1"></i>2026 Ecommerce Store. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/next-ui.js"></script>
</body>
</html>
