<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Error</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/mobile.css" />
</head>
<body>
  <div class="container mt-5">
    <div class="card p-4">
      <h1 class="text-danger">500 — Internal Server Error</h1>
      <p>An unexpected error occurred while processing <strong th:text="${requestUri}"></strong>.</p>
      <p class="text-muted">Message: <span th:text="${errorMessage}"></span></p>
      <div class="mt-3">
        <a href="http://localhost:9090/" class="btn btn-primary">Return Home</a>
        <a href="http://localhost:9090/" class="btn btn-secondary">Open Project</a>
        <a href="http://localhost:9090/h2-console" class="btn btn-info">H2 Database</a>
      </div>
    </div>
  </div>
</body>
</html>
