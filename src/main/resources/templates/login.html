<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Ecommerce Store</title>
  <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='currentColor' class='bi bi-shop' viewBox='0 0 16 16'><path d='M2.97 1.35A1 1 0 0 1 3.73 1h8.54a1 1 0 0 1 .76.35l2.609 3.044A1.5 1.5 0 0 1 16 5.37v.255a2.375 2.375 0 0 1-4.25 1.458A2.371 2.371 0 0 1 9.875 8 2.37 2.37 0 0 1 8 7.083 2.37 2.37 0 0 1 6.125 8a2.37 2.37 0 0 1-1.875-.917A2.375 2.375 0 0 1 0 5.625V5.37a1.5 1.5 0 0 1 .361-.976l2.61-3.045zm1.78 4.275a1.375 1.375 0 0 0 2.75 0 .5.5 0 0 1 1 0 1.375 1.375 0 0 0 2.75 0 .5.5 0 0 1 1 0 1.375 1.375 0 1 0 2.75 0V5.37a.5.5 0 0 0-.12-.325L12.27 2H3.73L1.12 5.045A.5.5 0 0 0 1 5.37v.255a1.375 1.375 0 0 0 2.75 0 .5.5 0 0 1 1 0zM1.5 8.5A.5.5 0 0 1 2 9v6h1v-5a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v5h6V9a.5.5 0 0 1 1 0v6h.5a.5.5 0 0 1 0 1H.5a.5.5 0 0 1 0-1H1V9a.5.5 0 0 1 .5-.5zM4 15h3v-5H4v5zm5-5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1v-3zm3 0h-2v3h2v-3z'/></svg>" type="image/svg+xml" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/next-ui.css" />
</head>
<body class="next-ui">
  <div class="top-glow"></div>
  <header>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-shop me-2"></i>Ecommerce Store</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link active" href="/login"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a></li>
            <li class="nav-item"><a class="nav-link" href="/customer/register"><i class="bi bi-person-plus me-1"></i>Register</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="page-main">
    <div class="page-container container">
      <div class="container mt-4" th:if="${session.failure!=null || session.success!=null}">
        <div class="alert alert-danger alert-dismissible fade show" th:if="${session.failure}" role="alert">
          <span th:text="${session.failure}"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div class="alert alert-success alert-dismissible fade show" th:if="${session.success}" role="alert">
          <span th:text="${session.success}"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div class="session-message-remover" th:text="${@sessionMessageRemover.removeMessage()}"></div>
      </div>

      <section class="section-shell p-4 p-lg-5">
        <div class="row g-4 align-items-stretch">
          <div class="col-lg-6">
            <div class="hero page-hero h-100 d-flex flex-column justify-content-center">
              <h1 class="display-5 mb-3">Welcome Back</h1>
              <p class="lead mb-4">Sign in to continue shopping, manage your orders, and track deliveries.</p>
              <div class="quick-actions">
                <div class="quick-card"><i class="bi bi-truck me-2"></i>Order Tracking</div>
                <div class="quick-card"><i class="bi bi-shield-check me-2"></i>Secure Checkout</div>
                <div class="quick-card"><i class="bi bi-stars me-2"></i>Curated Deals</div>
              </div>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="form-container h-100 p-4 p-lg-5">
              <h2 class="mb-4">Login to Your Account</h2>
              <form action="/login" method="post">
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input type="text" class="form-control" id="email" name="email" placeholder="Enter your email" />
                </div>
                <div class="mb-4">
                  <label for="password" class="form-label">Password</label>
                  <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" />
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
              </form>
              <p class="mt-4 mb-0 text-center">Don't have an account? <a href="/customer/register">Register here</a></p>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p class="mb-0"><i class="bi bi-c-circle me-1"></i>2026 Ecommerce Store. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/next-ui.js"></script>
</body>
</html>
